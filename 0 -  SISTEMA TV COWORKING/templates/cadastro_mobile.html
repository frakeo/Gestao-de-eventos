<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg:        #F7F5F0;
            --surface:   #FFFFFF;
            --panel:     #F2EFE9;
            --gold:      #B8975A;
            --gold-lt:   #D4B87A;
            --gold-dim:  #EDE3CF;
            --text:      #1A1814;
            --muted:     #7A766E;
            --border:    #E2DDD4;
            --green-bg:  #EAF5EA;
            --green-bdr: #6DB86D;
            --red:       #C0392B;
            --shadow:    0 2px 14px rgba(0,0,0,0.07);
            --radius:    14px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* ── SHELL ─── */
        .shell {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* ── HEADER ─── */
        header {
            background: var(--text);
            padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .brand { display: flex; align-items: center; gap: 10px; }
        .bar { width: 3px; height: 28px; background: var(--gold); border-radius: 2px; flex-shrink: 0; }
        .brand h1 { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #fff; }
        .brand p { font-size: 9px; color: var(--gold-lt); letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }
        .back-btn {
            display: flex; align-items: center; gap: 5px;
            color: var(--gold-lt); font-size: 12px; font-weight: 500;
            text-decoration: none; letter-spacing: .04em;
        }
        .back-btn svg { width: 14px; height: 14px; }

        /* ── TABS ─── */
        .tabs {
            display: flex;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .tab-btn {
            flex: 1;
            padding: 13px 8px;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px; font-weight: 500;
            color: var(--muted);
            border: none; border-bottom: 2.5px solid transparent;
            background: transparent; cursor: pointer;
            transition: color .2s, border-color .2s;
            letter-spacing: .04em;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .tab-btn svg { width: 13px; height: 13px; }
        .tab-btn.active { color: var(--text); border-bottom-color: var(--gold); }

        /* ── VIEWS ─── */
        .view { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .view.active { display: block; }

        /* ── FORM VIEW ─── */
        .form-wrap { padding: 16px 14px; padding-bottom: 24px; }

        .panel-title {
            font-size: 10px; font-weight: 600;
            letter-spacing: .12em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 16px;
            padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }

        .field { margin-bottom: 13px; }
        .field label {
            display: block; font-size: 10px; font-weight: 600;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 5px;
        }
        .field select,
        .field input {
            width: 100%; padding: 11px 12px;
            font-family: 'DM Sans', sans-serif; font-size: 15px;
            color: var(--text); background: var(--panel);
            border: 1.5px solid var(--border); border-radius: 9px;
            outline: none; -webkit-appearance: none; appearance: none;
            transition: border-color .2s;
        }
        .field select:focus, .field input:focus { border-color: var(--gold); background: #fff; }

        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        #mensagemConflito {
            font-size: 12px; font-weight: 600;
            color: var(--red); min-height: 18px; margin-bottom: 6px;
        }

        .btn-salvar {
            width: 100%; padding: 14px;
            background: var(--gold); color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 600;
            letter-spacing: .1em; text-transform: uppercase;
            border: none; border-radius: 10px; cursor: pointer;
            transition: background .2s, transform .1s;
            margin-top: 4px;
        }
        .btn-salvar:active { transform: scale(.98); background: #a07a3e; }

        /* ── LISTA VIEW ─── */
        .lista-wrap { padding: 14px; padding-bottom: 24px; }

        .section-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px; margin-top: 4px;
        }
        .section-title {
            font-size: 11px; font-weight: 600;
            letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
        }
        .badge-hoje {
            background: var(--green-bg); color: var(--green-bdr);
            font-size: 9px; font-weight: 600; letter-spacing: .06em;
            text-transform: uppercase; padding: 2px 8px;
            border-radius: 99px; border: 1px solid #b8dfb8;
        }

        .filter-row {
            display: flex; align-items: center; gap: 6px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .filter-label {
            font-size: 10px; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--muted); white-space: nowrap;
        }
        .filter-row input[type="date"] {
            flex: 1; min-width: 120px;
            padding: 8px 10px; font-family: 'DM Sans', sans-serif;
            font-size: 13px; color: var(--text);
            background: var(--surface); border: 1.5px solid var(--border);
            border-radius: 8px; outline: none; -webkit-appearance: none;
        }
        .filter-row input[type="date"]:focus { border-color: var(--gold); }
        .btn-clear {
            padding: 7px 12px; background: transparent;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 12px;
            color: var(--muted); cursor: pointer; white-space: nowrap;
        }
        .count-text { font-size: 11px; color: var(--muted); }

        .ev-card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 13px;
            margin-bottom: 8px;
            box-shadow: 0 1px 6px rgba(0,0,0,.04);
        }
        .ev-card.hoje-card { border-left: 3px solid var(--green-bdr); }

        .ev-card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 8px;
            margin-bottom: 6px;
        }
        .ev-name { font-size: 14px; font-weight: 500; line-height: 1.3; flex: 1; }
        .ev-pill {
            display: inline-block; padding: 2px 9px;
            border-radius: 99px; font-size: 10px; font-weight: 600;
            background: var(--gold-dim); color: #7a5f2a;
            white-space: nowrap; flex-shrink: 0;
        }
        .ev-meta {
            font-size: 12px; color: var(--muted);
            display: flex; flex-wrap: wrap; gap: 6px 12px;
            margin-bottom: 8px;
        }
        .ev-meta span { display: flex; align-items: center; gap: 4px; }
        .ev-meta svg { width: 11px; height: 11px; opacity: .7; }

        .ev-actions { display: flex; gap: 6px; }
        .btn-edit, .btn-cancel {
            width: 32px; height: 32px; border: none;
            border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: opacity .15s;
        }
        .btn-edit   { background: #e8f5e8; color: #2e7d32; }
        .btn-cancel { background: #fdecea; color: var(--red); }

        .empty-msg {
            text-align: center; color: var(--muted);
            font-size: 13px; padding: 24px 0; font-style: italic;
        }

        /* ── CALENDARIO VIEW ─── */
        .cal-wrap { padding: 14px; padding-bottom: 24px; }

        .cal-header {
            display: flex; align-items: center;
            justify-content: space-between; margin-bottom: 12px;
        }
        .cal-month-label {
            font-family: 'Playfair Display', serif;
            font-size: 18px; font-weight: 600; color: var(--text);
        }
        .cal-controls { display: flex; align-items: center; gap: 6px; }
        .cal-nav-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1.5px solid var(--border); background: var(--surface);
            color: var(--text); font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-hoje {
            padding: 6px 12px; border-radius: 8px;
            border: 1.5px solid var(--border); background: var(--surface);
            font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
            color: var(--muted); cursor: pointer;
        }

        .sala-chips {
            display: flex; gap: 5px; overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 12px; padding-bottom: 4px;
            scrollbar-width: none;
        }
        .sala-chips::-webkit-scrollbar { display: none; }
        .sala-chip {
            padding: 4px 12px; border-radius: 99px; flex-shrink: 0;
            border: 1.5px solid var(--border); background: var(--surface);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px; font-weight: 500;
            color: var(--muted); cursor: pointer; white-space: nowrap;
            transition: all .15s;
        }
        .sala-chip.active { background: var(--gold-dim); color: #7a5f2a; border-color: var(--gold-lt); }

        .weekday-row {
            display: grid; grid-template-columns: repeat(7,1fr);
            gap: 2px; margin-bottom: 4px;
        }
        .weekday-row span {
            text-align: center; font-size: 9px; font-weight: 600;
            letter-spacing: .06em; text-transform: uppercase;
            color: var(--muted); padding: 3px 0;
        }

        .cal-grid {
            display: grid; grid-template-columns: repeat(7,1fr);
            gap: 2px; margin-bottom: 14px;
        }
        .cal-cell {
            border: 1px solid var(--border); border-radius: 7px;
            background: var(--surface); padding: 4px 3px;
            min-height: 44px; cursor: pointer;
            display: flex; flex-direction: column;
            align-items: flex-start; overflow: hidden;
            transition: border-color .15s;
        }
        .cal-cell:active { background: var(--gold-dim); }
        .cal-cell.other-month { background: var(--panel); opacity: .5; }
        .cal-cell.is-today { border-color: var(--gold); border-width: 1.5px; }
        .cal-cell.is-selected { background: #FDF8F0; border-color: var(--gold); }

        .cell-day-num {
            font-size: 10px; font-weight: 500; color: var(--muted);
            margin-bottom: 3px; line-height: 1;
        }
        .cal-cell.is-today .cell-day-num { color: var(--gold); font-weight: 600; }
        .cell-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--gold); margin: 1px auto;
        }
        .cell-ev-mini {
            font-size: 9px; white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; width: 100%;
            background: var(--gold-dim); color: #7a5f2a;
            border-radius: 2px; padding: 1px 3px;
            margin-bottom: 1px;
        }
        .cell-more { font-size: 9px; color: var(--muted); padding-left: 2px; }

        /* ── DETAIL PANEL ─── */
        .detail-panel {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 16px;
            box-shadow: var(--shadow);
        }
        .detail-date {
            font-family: 'Playfair Display', serif;
            font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 2px;
        }
        .detail-weekday { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
        .detail-divider { height: 1px; background: var(--border); margin-bottom: 14px; }
        .detail-empty { font-size: 13px; color: var(--muted); font-style: italic; }

        .detail-ev {
            padding: 11px; border-radius: 9px;
            border: 1px solid var(--border); margin-bottom: 8px;
        }
        .detail-ev:last-child { margin-bottom: 0; }
        .detail-ev-room {
            display: inline-block; font-size: 9px; font-weight: 600;
            background: var(--gold-dim); color: #7a5f2a;
            border-radius: 4px; padding: 2px 7px; margin-bottom: 5px;
        }
        .detail-ev-name { font-size: 13px; font-weight: 500; margin-bottom: 3px; line-height: 1.3; }
        .detail-ev-meta { font-size: 11px; color: var(--muted); line-height: 1.7; }
        .detail-ev-actions { display: flex; gap: 5px; margin-top: 7px; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    </style>
</head>
<body>

<div class="shell">

    <!-- HEADER -->
    <header>
        <div class="brand">
            <div class="bar"></div>
            <div>
                <h1>Gestão de Eventos</h1>
                <p>Agendamento de Espaços</p>
            </div>
        </div>
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Painel
        </a>
    </header>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-view="novo" onclick="switchTab('novo')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Novo
        </button>
        <button class="tab-btn" data-view="lista" onclick="switchTab('lista')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Lista
        </button>
        <button class="tab-btn" data-view="calendario" onclick="switchTab('calendario')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Calendário
        </button>
    </div>

    <!-- ── VIEW: NOVO ── -->
    <div id="view-novo" class="view active">
        <div class="form-wrap">
            <div class="panel-title" id="formTitle">Novo Agendamento</div>
            <form id="formEvento">
                <div class="field">
                    <label for="sala">Local</label>
                    <select name="sala" id="sala" required>
                        <option value="COWORKING">Coworking</option>
                        <option value="AUDITÓRIO MEZANINO">Sala de Reunião Mezanino</option>
                        <option value="AUDITÓRIO 8° ANDAR">Auditório 8° Andar</option>
                        <option value="SALA 360°">Sala 360°</option>
                        <option value="SALA DE REUNIÃO 9° ANDAR">Sala de Reunião 9° Andar</option>
                    </select>
                </div>
                <div class="field">
                    <label for="evento">Evento</label>
                    <input type="text" id="evento" name="evento" placeholder="Nome do evento" required>
                </div>
                <div class="field">
                    <label for="organizador">Órgão</label>
                    <input type="text" id="organizador" name="organizador" placeholder="Órgão responsável" required>
                </div>
                <div class="field">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>
                <div class="row-2">
                    <div class="field">
                        <label for="hora_inicio">Início</label>
                        <input type="time" id="hora_inicio" name="hora_inicio" required>
                    </div>
                    <div class="field">
                        <label for="hora_fim">Término</label>
                        <input type="time" id="hora_fim" name="hora_fim" required>
                    </div>
                </div>
                <div class="field">
                    <label for="publico">Nº de Pessoas</label>
                    <input type="text" id="publico" name="publico" placeholder="Estimativa" required>
                </div>
                <div id="mensagemConflito"></div>
                <button type="submit" class="btn-salvar" id="btnSalvar">Salvar Agendamento</button>
            </form>
        </div>
    </div>

    <!-- ── VIEW: LISTA ── -->
    <div id="view-lista" class="view">
        <div class="lista-wrap">

            <!-- HOJE -->
            <div class="section-header">
                <span class="section-title">Hoje</span>
                <span class="badge-hoje">Agendamentos do dia</span>
            </div>
            <div id="eventosHoje">
                <p class="empty-msg">Nenhum evento hoje</p>
            </div>

            <!-- TODOS -->
            <div style="margin-top: 20px;">
                <div class="section-header">
                    <span class="section-title">Próximos Eventos</span>
                    <span class="count-text" id="contagem"></span>
                </div>

                <div class="filter-row">
                    <span class="filter-label">De</span>
                    <input type="date" id="filtroDataDe">
                    <span class="filter-label">Até</span>
                    <input type="date" id="filtroDataAte">
                    <button class="btn-clear" type="button" onclick="limparFiltro()">✕</button>
                </div>

                <div id="tabelaEventos">
                    <p class="empty-msg">Nenhum evento agendado</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ── VIEW: CALENDÁRIO ── -->
    <div id="view-calendario" class="view">
        <div class="cal-wrap">

            <div class="cal-header">
                <span class="cal-month-label" id="calMonthLabel">—</span>
                <div class="cal-controls">
                    <button class="cal-nav-btn" id="calPrev">&#8249;</button>
                    <button class="btn-hoje" id="calToday">Hoje</button>
                    <button class="cal-nav-btn" id="calNext">&#8250;</button>
                </div>
            </div>

            <div class="sala-chips" id="salaChips">
                <button class="sala-chip active" data-sala="">Todos os locais</button>
            </div>

            <div class="weekday-row">
                <span>D</span><span>S</span><span>T</span>
                <span>Q</span><span>Q</span><span>S</span><span>S</span>
            </div>

            <div class="cal-grid" id="calGrid"></div>

            <div id="detailPanel" style="display:none;" class="detail-panel">
                <div class="detail-date" id="detailDate">—</div>
                <div class="detail-weekday" id="detailWeekday">—</div>
                <div class="detail-divider"></div>
                <div id="detailList"></div>
            </div>

        </div>
    </div>

</div>

<script>
    const todayObj = new Date();
    const todayStr = todayObj.toISOString().split("T")[0];

    let eventos = [];
    let calYear  = todayObj.getFullYear();
    let calMonth = todayObj.getMonth();
    let calSelectedDate = null;
    let calFilterSala   = "";

    const MONTHS_PT  = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                        "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    const WEEKDAYS_LONG = ["domingo","segunda-feira","terça-feira","quarta-feira",
                           "quinta-feira","sexta-feira","sábado"];

    /* ── DATA ─── */
    async function carregarEventos() {
        try {
            const r    = await fetch("/eventos");
            const dados = await r.json();
            const agora = new Date();
            eventos = dados.filter(ev => {
                const fim = new Date(`${ev.data}T${ev.hora_fim}:00`);
                fim.setMinutes(fim.getMinutes() + 5);
                return agora <= fim;
            });
            preencherLista();
            buildSalaChips();
            renderCalendar();
            if (calSelectedDate) showDetailFor(calSelectedDate);
        } catch(e) {
            console.error("Erro ao carregar eventos:", e);
        }
    }

    /* ── UTILS ─── */
    function formatarData(d) {
        if (!d) return "";
        const [y, m, day] = d.split("-");
        return `${day}/${m}/${y}`;
    }
    function eventsForDate(dateStr) {
        return eventos.filter(e =>
            e.data === dateStr && (!calFilterSala || e.sala === calFilterSala)
        );
    }

    /* ── TABS ─── */
    function switchTab(view) {
        document.querySelectorAll(".tab-btn").forEach(b =>
            b.classList.toggle("active", b.dataset.view === view)
        );
        document.querySelectorAll(".view").forEach(v =>
            v.classList.toggle("active", v.id === "view-" + view)
        );
        if (view === "calendario" && calSelectedDate) showDetailFor(calSelectedDate);
    }

    /* ── LISTA ─── */
    function preencherLista() {
        const hojeEl  = document.getElementById("eventosHoje");
        const proxEl  = document.getElementById("tabelaEventos");
        const countEl = document.getElementById("contagem");
        const de  = document.getElementById("filtroDataDe").value;
        const ate = document.getElementById("filtroDataAte").value;

        hojeEl.innerHTML  = "";
        proxEl.innerHTML  = "";

        const ord = eventos.slice().sort((a,b) => new Date(a.data) - new Date(b.data));
        let visiveis = 0;

        ord.forEach(e => {
            if (e.data === todayStr) {
                hojeEl.innerHTML += cardHTML(e, true);
            } else {
                const ok = (!de || e.data >= de) && (!ate || e.data <= ate);
                if (ok) {
                    visiveis++;
                    proxEl.innerHTML += cardHTML(e, false);
                }
            }
        });

        if (!hojeEl.innerHTML)
            hojeEl.innerHTML = `<p class="empty-msg">Nenhum evento hoje</p>`;
        if (!proxEl.innerHTML)
            proxEl.innerHTML = `<p class="empty-msg">Nenhum evento agendado</p>`;

        const total = ord.filter(e => e.data !== todayStr).length;
        countEl.textContent = (de || ate) ? `${visiveis} de ${total}` : total > 0 ? `${total} evento(s)` : "";
    }

    function cardHTML(e, isHoje) {
        const dataStr = isHoje ? "" : `<span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatarData(e.data)}</span>`;
        return `
        <div class="ev-card${isHoje ? " hoje-card" : ""}">
            <div class="ev-card-top">
                <div class="ev-name">${e.evento}</div>
                <span class="ev-pill">${e.sala.length > 14 ? e.sala.slice(0,13)+"…" : e.sala}</span>
            </div>
            <div class="ev-meta">
                ${dataStr}
                <span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    ${e.hora_inicio} – ${e.hora_fim}
                </span>
                <span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    ${e.organizador || "SRA-ES"} · ${e.publico} pessoas
                </span>
            </div>
            <div class="ev-actions">
                <button class="btn-edit" onclick="editarEvento('${e.ID}')">✏</button>
                <button class="btn-cancel" onclick="cancelarEvento('${e.ID}')">✕</button>
            </div>
        </div>`;
    }

    function limparFiltro() {
        document.getElementById("filtroDataDe").value = "";
        document.getElementById("filtroDataAte").value = "";
        preencherLista();
    }
    document.getElementById("filtroDataDe").onchange = preencherLista;
    document.getElementById("filtroDataAte").onchange = preencherLista;

    /* ── CALENDAR ─── */
    let salaChipsInit = false;
    function buildSalaChips() {
        const salas = [...new Set(eventos.map(e => e.sala))].sort();
        const c = document.getElementById("salaChips");
        c.innerHTML = `<button class="sala-chip active" data-sala="">Todos os locais</button>`;
        salas.forEach(s => {
            const b = document.createElement("button");
            b.className = "sala-chip"; b.dataset.sala = s; b.textContent = s;
            c.appendChild(b);
        });
        if (!salaChipsInit) {
            salaChipsInit = true;
            c.addEventListener("click", e => {
                const btn = e.target.closest(".sala-chip");
                if (!btn) return;
                c.querySelectorAll(".sala-chip").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                calFilterSala = btn.dataset.sala;
                renderCalendar();
                if (calSelectedDate) showDetailFor(calSelectedDate);
            });
        }
    }

    function renderCalendar() {
        document.getElementById("calMonthLabel").textContent = `${MONTHS_PT[calMonth]} ${calYear}`;
        const firstDay    = new Date(calYear, calMonth, 1).getDay();
        const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
        const daysInPrev  = new Date(calYear, calMonth, 0).getDate();
        const total       = Math.ceil((firstDay + daysInMonth) / 7) * 7;

        const grid = document.getElementById("calGrid");
        grid.innerHTML = "";

        for (let i = 0; i < total; i++) {
            let dayNum, monthOffset = 0;
            if (i < firstDay)                     { dayNum = daysInPrev - firstDay + i + 1; monthOffset = -1; }
            else if (i >= firstDay + daysInMonth)  { dayNum = i - firstDay - daysInMonth + 1; monthOffset = 1; }
            else                                   { dayNum = i - firstDay + 1; }

            const d = new Date(calYear, calMonth + monthOffset, dayNum);
            const dateStr = d.toISOString().split("T")[0];
            const evs = eventsForDate(dateStr);

            const cell = document.createElement("div");
            cell.className = "cal-cell";
            if (monthOffset !== 0) cell.classList.add("other-month");
            if (dateStr === todayStr)        cell.classList.add("is-today");
            if (dateStr === calSelectedDate) cell.classList.add("is-selected");

            let html = `<div class="cell-day-num">${dayNum}</div>`;
            if (evs.length > 0) {
                // on small screens, show dots only
                evs.slice(0, 1).forEach(e => {
                    const label = e.evento.length > 8 ? e.evento.slice(0,7)+"…" : e.evento;
                    html += `<div class="cell-ev-mini">${label}</div>`;
                });
                if (evs.length > 1) html += `<div class="cell-more">+${evs.length-1}</div>`;
            }
            cell.innerHTML = html;

            cell.addEventListener("click", () => {
                calSelectedDate = dateStr;
                renderCalendar();
                showDetailFor(dateStr);
                document.getElementById("detailPanel").scrollIntoView({ behavior: "smooth", block: "nearest" });
            });
            grid.appendChild(cell);
        }
    }

    function showDetailFor(dateStr) {
        const [y, m, d] = dateStr.split("-");
        const jsDate  = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
        const weekday = WEEKDAYS_LONG[jsDate.getDay()];

        const panel = document.getElementById("detailPanel");
        panel.style.display = "block";

        document.getElementById("detailDate").textContent =
            `${parseInt(d)} de ${MONTHS_PT[parseInt(m)-1]}`;
        document.getElementById("detailWeekday").textContent =
            weekday.charAt(0).toUpperCase() + weekday.slice(1);

        const evs = eventsForDate(dateStr)
            .slice().sort((a,b) => a.hora_inicio.localeCompare(b.hora_inicio));

        const list = document.getElementById("detailList");
        if (!evs.length) {
            list.innerHTML = `<p class="detail-empty">Nenhum evento neste dia.</p>`;
            return;
        }
        list.innerHTML = evs.map(e => `
            <div class="detail-ev">
                <div class="detail-ev-room">${e.sala}</div>
                <div class="detail-ev-name">${e.evento}</div>
                <div class="detail-ev-meta">
                    ${e.hora_inicio} – ${e.hora_fim}<br>
                    ${e.organizador || "SRA-ES"} · ${e.publico} pessoas
                </div>
                <div class="detail-ev-actions">
                    <button class="btn-edit" onclick="editarEvento('${e.ID}')">✏</button>
                    <button class="btn-cancel" onclick="cancelarEvento('${e.ID}')">✕</button>
                </div>
            </div>
        `).join("");
    }

    document.getElementById("calPrev").onclick = () => {
        calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
        renderCalendar();
    };
    document.getElementById("calNext").onclick = () => {
        calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
        renderCalendar();
    };
    document.getElementById("calToday").onclick = () => {
        calYear = todayObj.getFullYear(); calMonth = todayObj.getMonth();
        calSelectedDate = todayStr;
        renderCalendar(); showDetailFor(todayStr);
    };

    /* ── FORM ─── */
    function verificarConflito() {
        const sala       = document.getElementById("sala").value;
        const data       = document.getElementById("data").value;
        const hi         = document.getElementById("hora_inicio").value;
        const hf         = document.getElementById("hora_fim").value;
        const msg        = document.getElementById("mensagemConflito");
        const editando   = document.getElementById("formEvento").dataset.editando;

        const conflito = eventos.find(ev =>
            ev.sala === sala &&
            ev.data === data &&
            ev.ID != editando &&
            (
                (hi >= ev.hora_inicio && hi < ev.hora_fim) ||
                (hf > ev.hora_inicio  && hf <= ev.hora_fim) ||
                (hi <= ev.hora_inicio && hf >= ev.hora_fim)
            )
        );
        msg.textContent = conflito ? "⚠ Conflito de horário nesta sala." : "";
    }

    ["sala","data","hora_inicio","hora_fim"].forEach(id =>
        document.getElementById(id).addEventListener("change", verificarConflito)
    );

    function editarEvento(id) {
        const e = eventos.find(ev => ev.ID == id);
        if (!e) return;
        document.getElementById("sala").value        = e.sala;
        document.getElementById("evento").value      = e.evento;
        document.getElementById("organizador").value = e.organizador;
        document.getElementById("data").value        = e.data;
        document.getElementById("hora_inicio").value = e.hora_inicio;
        document.getElementById("hora_fim").value    = e.hora_fim;
        document.getElementById("publico").value     = e.publico;
        document.getElementById("formEvento").dataset.editando = id;
        document.getElementById("btnSalvar").textContent = "Salvar Edição";
        document.getElementById("formTitle").textContent = "Editar Agendamento";
        switchTab("novo");
        window.scrollTo(0, 0);
    }

    async function cancelarEvento(id) {
        if (!confirm("Confirmar cancelamento deste evento?")) return;
        const r = await fetch("/cancelar/" + id, { method: "POST" });
        if (r.ok) {
            carregarEventos();
            if (calSelectedDate) showDetailFor(calSelectedDate);
        }
    }

    document.getElementById("formEvento").onsubmit = async function(e) {
        e.preventDefault();
        const idEdicao = this.dataset.editando;
        const formData = new FormData(this);
        const url = idEdicao ? "/editar/" + idEdicao : "/cadastro";
        const r = await fetch(url, { method: "POST", body: formData });
        if (r.ok) {
            this.reset();
            delete this.dataset.editando;
            document.getElementById("btnSalvar").textContent = "Salvar Agendamento";
            document.getElementById("formTitle").textContent = "Novo Agendamento";
            document.getElementById("mensagemConflito").textContent = "";
            carregarEventos();
            switchTab("lista");
        } else {
            const err = await r.json().catch(() => ({}));
            alert(err.error || "Erro ao salvar. Tente novamente.");
        }
    };

    carregarEventos();
</script>
</body>
